services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copiuma_cast
      POSTGRES_USER: cast
      POSTGRES_PASSWORD: c3R1ZGVudG9iamVjdGxlZg==
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cast -d copiuma_cast"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: cast_rmq
      RABBITMQ_DEFAULT_PASS: d2hhdGphcmZvb3RiYWxscw==
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cast_minio
      MINIO_ROOT_PASSWORD: bGlldHJpYmU=
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==========================================
  # ПРИЛОЖЕНИЕ COPIUMA.CAST
  # ==========================================
  cast-api:
    build:
      context: .
      dockerfile: backend/Cast.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=copiuma_cast;Username=cast;Password=c3R1ZGVudG9iamVjdGxlZg==
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - RabbitMq__User=cast_rmq
      - RabbitMq__Password=d2hhdGphcmZvb3RiYWxscw==
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=cast_minio
      - Minio__SecretKey=cast_minio_password
      - Jwt__Key=YmFkbHlwZXJoYXBzdGFsbHByb2dyYW1jdXJyZW50YmE=
      - MediaPipeline__WorkerSecret=bGVzc29uc3RvbmV0aGlydHltZWFzdXJlY2VudHBsYWk=
      - Seed__AdminPassword=bW92ZXNoZWxmcHJvcGVyc3VjY2Vzc2dvcGVuY2lsc2g=!
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  cast-worker:
    build:
      context: .
      dockerfile: backend/Cast.MediaProcessing.Worker/Dockerfile 
    environment:
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=copiuma_cast;Username=cast;Password=c3R1ZGVudG9iamVjdGxlZg==
      - RabbitMq__Host=rabbitmq
      - RabbitMq__User=cast_rmq
      - RabbitMq__Password=d2hhdGphcmZvb3RiYWxscw==
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=cast_minio
      - Minio__SecretKey=cast_minio_password
      - Callback__BaseUrl=http://cast-api:8080
      - Callback__WorkerSecret=bGVzc29uc3RvbmV0aGlydHltZWFzdXJlY2VudHBsYWk=
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      cast-api:
        condition: service_started

  cast-gateway:
    build:
      context: .
      dockerfile: backend/Cast.Gateway/Dockerfile
    ports:
      - "5208:8080" # Открываем наружу только шлюз
    depends_on:
      - cast-api

  cast-web:
    build:
      context: frontend/cast.web
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - cast-gateway

volumes:
  pgdata:
  miniodata: