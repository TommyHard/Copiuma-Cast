services:
  # ==========================================
  # Infrastructure
  # ==========================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copiuma_cast
      POSTGRES_USER: cast
      POSTGRES_PASSWORD: cast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cast -d copiuma_cast"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cast
      MINIO_ROOT_PASSWORD: cast12345
    ports:
      - "9000:9000"     
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Backend
  # ==========================================
  cast-api:
    build:
      context: .
      dockerfile: backend/Cast.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=copiuma_cast;Username=cast;Password=cast
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - RabbitMq__User=guest
      - RabbitMq__Password=guest
      - Storage__PublicEndpoint=http://localhost:9000
      - Storage__Endpoint=http://minio:9000
      - Storage__PublicBaseUrl=http://localhost:5208/files
      - Storage__AccessKey=cast
      - Storage__SecretKey=cast12345
      - Jwt__Key=SomeSuperSecretKeyForLocalDevelopment123!
      - MediaPipeline__WorkerSecret=LocalWorkerSecret123
      - Seed__AdminPassword=Admin123!
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  cast-worker:
    build:
      context: .
      dockerfile: backend/Cast.MediaProcessing.Worker/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=copiuma_cast;Username=cast;Password=cast
      - RabbitMq__Host=rabbitmq
      - RabbitMq__User=guest
      - RabbitMq__Password=guest
      - Storage__Endpoint=minio:9000
      - Storage__AccessKey=cast
      - Storage__SecretKey=cast12345
      - Callback__BaseUrl=http://cast-api:8080
      - Callback__WorkerSecret=LocalWorkerSecret123
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      cast-api:
        condition: service_started

  cast-gateway:
    build:
      context: .
      dockerfile: gateway/Cast.Gateway/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5208:8080"
    depends_on:
      - cast-api

volumes:
  pgdata:
  miniodata: