# Инфраструктура для Copiuma.Cast (локальная разработка).
# Поднять:  docker compose -f deploy/docker-compose.yml up -d
# Совпадает с настройками backend/Cast.API/appsettings.json.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: copiuma_cast
      POSTGRES_USER: cast
      POSTGRES_PASSWORD: cast
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cast -d copiuma_cast"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # веб-консоль управления
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cast
      MINIO_ROOT_PASSWORD: cast12345
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # веб-консоль
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
